<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhattisgarh Environmental Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h1>🌿 Chhattisgarh Environmental Monitor</h1>
                <div id="authButtons">
                    <a href="login.html" style="background: transparent; border: 1px solid #3b82f6; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; color: #3b82f6; font-weight: 600; margin-right: 0.5rem;">Login</a>
                    <a href="register.html" style="background: #3b82f6; border: 1px solid #3b82f6; padding: 0.5rem 1rem; border-radius: 6px; text-decoration: none; color: white; font-weight: 600;">Register</a>
                </div>
            </div>
            <p class="subtitle">Real-time pollution tracking for Raipur · Bilaspur · Bhilai · Baloda Bazar</p>
        </header>

        <!-- City Filter -->
        <section class="controls-bar">
            <div class="filter-group">
                <label for="citySelect">Select City:</label>
                <select id="citySelect">
                    <option value="all" selected>All Cities</option>
                    <option value="Raipur">Raipur</option>
                    <option value="Bilaspur">Bilaspur</option>
                    <option value="Bhilai">Bhilai</option>
                    <option value="Baloda Bazar">Baloda Bazar</option>
                </select>
            </div>
            <div id="statusMessage" class="status-pill">Loading data...</div>
        </section>

        <!-- Map Section -->
        <section class="card map-card">
            <h2>Monitoring Map</h2>
            <div id="map"></div>
        </section>

        <!-- Charts Row -->
        <section class="charts-row">
            <div class="card chart-card">
                <h2>AQI Trend Over Time</h2>
                <canvas id="aqiTrendChart"></canvas>
            </div>
            <div class="card chart-card">
                <h2>Pollutant Comparison</h2>
                <canvas id="pollutantChart"></canvas>
            </div>
        </section>

        <!-- Data Table -->
        <section class="card">
            <h2>Pollution Data Records</h2>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>City</th>
                            <th>Date</th>
                            <th>PM2.5</th>
                            <th>PM10</th>
                            <th>NO₂</th>
                            <th>SO₂</th>
                            <th>CO</th>
                            <th>O₃</th>
                            <th>AQI</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="10" class="loading">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
