<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration - PrithviNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>.auth-container { max-width: 400px; margin: 4rem auto; }</style>
</head>
<body>
    <div class="container auth-container">
        <header>
            <h1>Citizen Registration</h1>
            <p class="subtitle">Join PrithviNet to monitor your neighbourhood</p>
        </header>
        <main>
            <div class="card">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Full Name</label>
                        <input type="text" id="username" placeholder="e.g., Rahul Sharma" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <button type="submit" class="btn-submit">Create Citizen Account</button>
                    <div id="registerMessage" class="message"></div>
                </form>
                <div style="text-align:center;margin-top:1.5rem;color:var(--text-muted);font-size:0.9em">
                    Already registered? <a href="citizen-login.html" style="color:var(--primary-color);font-weight:500;text-decoration:none">Login here</a><br><br>
                    <a href="register.html" style="color:var(--text-muted);text-decoration:none;font-size:0.85em">Register as Operator instead →</a>
                </div>
                <div style="text-align:center;margin-top:1rem">
                    <a href="index.html" style="color:var(--primary-color);text-decoration:none;font-weight:500">&larr; Back to Home</a>
                </div>
            </div>
        </main>
    </div>
    <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('registerMessage');
        const btn = document.querySelector('.btn-submit');
        btn.disabled = true; btn.textContent = 'Creating account...';
        try {
            const res = await fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value,
                    role: 'citizen'
                })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            msg.textContent = 'Registration successful! Redirecting...';
            msg.className = 'message success';
            setTimeout(() => { window.location.href = 'citizen-login.html'; }, 1500);
        } catch (err) {
            msg.textContent = err.message; msg.className = 'message error';
        } finally { btn.disabled = false; btn.textContent = 'Create Citizen Account'; }
    });
    </script>
</body>
</html>
