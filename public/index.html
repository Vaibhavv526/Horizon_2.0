<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrithviNet - Environmental Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.5rem;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 650px;
            margin-bottom: 3rem;
        }
        .hero-buttons {
            display: flex;
            gap: 1.5rem;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background-color: var(--primary-color);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container hero">
        <h1>PrithviNet</h1>
        <p>Smart environmental monitoring platform for Chhattisgarh. Real-time air quality, water health, and noise pollution tracking across cities and industries.</p>
        
        <div class="hero-buttons">
            <a href="login.html" class="btn-primary">Operator Login →</a>
            <a href="citizen-login.html" class="btn-secondary">Citizen Portal 👤</a>
        </div>
        <div style="margin-top:1.5rem;display:flex;gap:2rem;font-size:0.85rem;color:var(--text-muted)">
            <a href="register.html" style="color:var(--text-muted);text-decoration:none">Operator Registration</a>
            <a href="citizen-register.html" style="color:var(--text-muted);text-decoration:none">Citizen Registration</a>
        </div>
    </div>
</body>
</html>
