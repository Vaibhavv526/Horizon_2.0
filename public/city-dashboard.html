<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Analysis - PrithviNet</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .city-header {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            color: #475569;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .back-btn:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-inner">
            <div class="nav-brand">
                <span class="brand-icon">🌿</span>
                <span class="brand-text">PrithviNet</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 2rem;">
        <div class="city-header">
            <div>
                <h1 id="cityNameDisplay" style="margin:0; font-size: 1.75rem; color: #1e293b;">City Loading...</h1>
                <p id="citySubtitle" style="margin:4px 0 0; color: #64748b;">Detailed environmental analysis</p>
            </div>
            <a href="dashboard.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Main Dashboard
            </a>
        </div>

        <div class="metrics-grid">
            <div class="card">
                <h2>🌿 Air Quality Index</h2>
                <div style="height: 300px;"><canvas id="cityAirChart"></canvas></div>
            </div>
            <div class="card">
                <h2>💧 Water Quality</h2>
                <div style="height: 300px;"><canvas id="cityWaterChart"></canvas></div>
            </div>
            <div class="card">
                <h2>🔊 Noise Levels</h2>
                <div style="height: 300px;"><canvas id="cityNoiseChart"></canvas></div>
            </div>
        </div>

        <div class="card">
            <h2>📍 Monitoring Locations</h2>
            <div id="cityMap" style="height: 400px; border-radius: 8px; margin-bottom: 1.5rem;"></div>
        </div>

        <div class="card" style="margin-top: 1.5rem;">
            <h2>📊 Detailed Records</h2>
            <div class="table-container">
                <table id="cityRecordsTable">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Station</th>
                            <th>Date</th>
                            <th>Primary Metric</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="cityTableBody">
                        <tr><td colspan="5" style="text-align:center; padding: 2rem;">Loading city records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="city-script.js"></script>
</body>
</html>
