<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Registration - PrithviNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
        }
    </style>
</head>
<body>
    <div class="container auth-container">
        <header>
            <h1>Create Account</h1>
            <p class="subtitle">Join to submit monitoring data</p>
        </header>

        <main>
            <div class="card">
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="e.g., env_hero" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a strong password" required>
                    </div>

                    <button type="submit" class="btn-submit">Register</button>
                    <div id="registerMessage" class="message"></div>
                </form>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">&larr; Back to Home</a>
                </div>
            </div>
        </main>
    </div>

    <script src="register.js"></script>
</body>
</html>
